name: "Artillery load testing action"
author: Artillery
description: "Load testing of your application at scale."

inputs:
  command:
    required: true
    description: "Artillery CLI command to execute"
  working-directory:
    description: "Custom working directory for Artillery commands"

runs:
  # Prebuilt image published by .github/workflows/publish-image.yml.
  # The tag MUST match the release tag of this action (without the leading "v")
  # and is rewritten by .github/workflows/release.yml on each release.
  using: "docker"
  image: "docker://ghcr.io/artilleryio/action-cli:2.0.30"
  env:
    CWD: ${{ inputs.working-directory }}
  args:
    - ${{ inputs.command }}

branding:
  icon: zap
  color: gray-dark
