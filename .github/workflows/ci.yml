name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Verify that the ARTILLERY_VERSION default baked into the Dockerfile matches
  # the version declared in package.json. On release, the release workflow also
  # asserts this matches the release tag.
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert Dockerfile ARTILLERY_VERSION matches package.json
        run: |
          set -euo pipefail
          pkg_version="$(jq -r .version package.json)"
          dockerfile_version="$(grep -E '^ARG ARTILLERY_VERSION=' Dockerfile | head -n1 | cut -d= -f2)"
          action_image_tag="$(grep -oE 'ghcr\.io/artilleryio/action-cli:[^"]+' action.yml | head -n1 | cut -d: -f2)"

          echo "package.json version:       ${pkg_version}"
          echo "Dockerfile ARTILLERY_VERSION: ${dockerfile_version}"
          echo "action.yml image tag:        ${action_image_tag}"

          if [ "${pkg_version}" != "${dockerfile_version}" ]; then
            echo "::error::Dockerfile ARTILLERY_VERSION (${dockerfile_version}) does not match package.json (${pkg_version})."
            exit 1
          fi
          if [ "${pkg_version}" != "${action_image_tag}" ]; then
            echo "::error::action.yml image tag (${action_image_tag}) does not match package.json (${pkg_version})."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs: [version-consistency]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Stage the Dockerfile next to the local action definition so that
      # `uses: ./.github/action-local` builds the image from source. This
      # lets PRs exercise the action end-to-end before the image is pushed
      # to GHCR by the release workflow.
      - name: Stage local action
        run: |
          cp Dockerfile entrypoint.sh .github/action-local/

      - name: Debug
        run: |
          whoami
          pwd
      # A test for the basic CLI usage.
      - name: Running a single test
        uses: ./.github/action-local
        with:
          command: run ./test.yml

      - name: Running a Playwright-based test
        uses: ./.github/action-local
        with:
          command: run ./browser-test.ts

      # The generated report must be available to the rest of the workflow.
      - name: Generating the report
        uses: ./.github/action-local
        with:
          command: run ./test.yml --output ./report.json
      - name: Access report
        run: |
          if [ ! -f ./report.json ]; then
            echo "The generated report JSON file couldn't be accessed."
            exit 1
          fi

      # Supports custom working directory.
      - name: Prepare custom directory
        run: |-
          mkdir ./my-dir
          cp ./test.yml ./my-dir/cwd.yml
      - name: Custom working directoery
        uses: ./.github/action-local
        with:
          command: run ./cwd.yml
          working-directory: ./my-dir
      - name: Cleanup
        run: rm -rf ./my-dir

      # Supports custom Artillery binary path.
      # Useful to test against intermediate builds of Artillery.
      - name: Prepare custom binary
        run: |-
          echo 'echo "$1" >> ./output.txt' >> ./custom-binary.sh
          chmod +x ./custom-binary.sh
      - name: Supports custom Artillery binary
        uses: ./.github/action-local
        with:
          command: hello
        env:
          ARTILLERY_BINARY_PATH: ./custom-binary.sh
      - name: Check the output
        run: '[[ "$(cat ./output.txt)" == "hello" ]] || exit 1'
      - name: Cleanup
        run: rm ./custom-binary.sh
